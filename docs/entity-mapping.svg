<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">StreamFlix Hibernate Entity Mapping</title>
  <desc id="desc">Entity relationship diagram for User, Subscription, Review, and Movie classes.</desc>
  <defs>
    <linearGradient id="headerGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 800 34px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #475569; font: 400 16px Arial, Helvetica, sans-serif; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; filter: url(#shadow); }
      .header { fill: url(#headerGradient); rx: 12; }
      .className { fill: #ffffff; font: 800 22px Arial, Helvetica, sans-serif; }
      .tableName { fill: #fee2e2; font: 600 13px Arial, Helvetica, sans-serif; }
      .section { fill: #334155; font: 700 13px Arial, Helvetica, sans-serif; letter-spacing: 0.5px; }
      .field { fill: #0f172a; font: 500 15px Arial, Helvetica, sans-serif; }
      .fieldMuted { fill: #64748b; font: 500 14px Arial, Helvetica, sans-serif; }
      .relationLine { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .relationLabelBg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 8; }
      .relationLabel { fill: #0f172a; font: 700 13px Arial, Helvetica, sans-serif; }
      .noteTitle { fill: #0f172a; font: 800 16px Arial, Helvetica, sans-serif; }
      .noteText { fill: #475569; font: 500 14px Arial, Helvetica, sans-serif; }
      .pill { fill: #fee2e2; stroke: #fecaca; stroke-width: 1; rx: 11; }
      .pillText { fill: #991b1b; font: 700 12px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="860"/>

  <text class="title" x="80" y="72">StreamFlix Hibernate Entity Mapping</text>
  <text class="subtitle" x="80" y="102">How the Java classes map to database tables and manage relationships in the current backend model.</text>

  <g transform="translate(80 150)">
    <rect class="card" x="0" y="0" width="340" height="270"/>
    <rect class="header" x="0" y="0" width="340" height="74"/>
    <text class="className" x="24" y="32">User</text>
    <text class="tableName" x="24" y="55">@Table(name = "users")</text>
    <text class="section" x="24" y="108">FIELDS</text>
    <text class="field" x="24" y="138">id: Long</text>
    <text class="fieldMuted" x="220" y="138">@Id, @GeneratedValue</text>
    <text class="field" x="24" y="168">name: String</text>
    <text class="field" x="24" y="198">createdAt: LocalDateTime</text>
    <text class="section" x="24" y="232">RELATIONS</text>
    <text class="field" x="24" y="258">subscription: Subscription</text>
  </g>

  <g transform="translate(860 150)">
    <rect class="card" x="0" y="0" width="340" height="250"/>
    <rect class="header" x="0" y="0" width="340" height="74"/>
    <text class="className" x="24" y="32">Subscription</text>
    <text class="tableName" x="24" y="55">@Table(name = "subscription")</text>
    <text class="section" x="24" y="108">FIELDS</text>
    <text class="field" x="24" y="138">id: long</text>
    <text class="fieldMuted" x="220" y="138">@Id, @GeneratedValue</text>
    <text class="field" x="24" y="168">price: int</text>
    <text class="field" x="24" y="198">duration: int</text>
    <text class="section" x="24" y="232">RELATION</text>
    <text class="field" x="118" y="232">user: User</text>
  </g>

  <g transform="translate(80 515)">
    <rect class="card" x="0" y="0" width="340" height="270"/>
    <rect class="header" x="0" y="0" width="340" height="74"/>
    <text class="className" x="24" y="32">Movie</text>
    <text class="tableName" x="24" y="55">@Table(name = "movies")</text>
    <text class="section" x="24" y="108">FIELDS</text>
    <text class="field" x="24" y="138">id: Long</text>
    <text class="fieldMuted" x="220" y="138">@Id, @GeneratedValue</text>
    <text class="field" x="24" y="168">title: String</text>
    <text class="field" x="24" y="198">genere: String</text>
    <text class="field" x="24" y="228">releaseDate: LocalDate</text>
    <text class="field" x="24" y="258">rating: double</text>
  </g>

  <g transform="translate(860 500)">
    <rect class="card" x="0" y="0" width="340" height="290"/>
    <rect class="header" x="0" y="0" width="340" height="74"/>
    <text class="className" x="24" y="32">Review</text>
    <text class="tableName" x="24" y="55">@Table(name = "reviews")</text>
    <text class="section" x="24" y="108">FIELDS</text>
    <text class="field" x="24" y="138">id: Long</text>
    <text class="fieldMuted" x="220" y="138">@Id, @GeneratedValue</text>
    <text class="field" x="24" y="168">reviewText: String</text>
    <text class="field" x="24" y="198">rating: Double</text>
    <text class="field" x="24" y="228">createdAt: LocalDateTime</text>
    <text class="section" x="24" y="262">RELATIONS</text>
    <text class="field" x="24" y="286">user: User, movie: Movie</text>
  </g>

  <path class="relationLine" d="M420 260 C560 260 700 260 860 260"/>
  <rect class="relationLabelBg" x="532" y="225" width="210" height="48"/>
  <text class="relationLabel" x="552" y="245">User 1 to 1 Subscription</text>
  <text class="fieldMuted" x="552" y="264">@OneToOne / user_id</text>

  <path class="relationLine" d="M420 330 C565 410 700 512 860 620"/>
  <rect class="relationLabelBg" x="520" y="408" width="226" height="52"/>
  <text class="relationLabel" x="540" y="429">User 1 to many Reviews</text>
  <text class="fieldMuted" x="540" y="448">@OneToMany mappedBy user</text>

  <path class="relationLine" d="M420 648 C570 648 700 648 860 648"/>
  <rect class="relationLabelBg" x="532" y="614" width="220" height="52"/>
  <text class="relationLabel" x="552" y="635">Movie 1 to many Reviews</text>
  <text class="fieldMuted" x="552" y="654">@OneToMany mappedBy movie</text>

  <path class="relationLine" d="M860 690 C720 735 560 735 420 690"/>
  <rect class="relationLabelBg" x="520" y="724" width="236" height="52"/>
  <text class="relationLabel" x="540" y="745">Review many to 1 Movie</text>
  <text class="fieldMuted" x="540" y="764">@ManyToOne movie</text>

  <path class="relationLine" d="M860 585 C690 500 585 370 420 270"/>
  <rect class="relationLabelBg" x="535" y="330" width="206" height="52"/>
  <text class="relationLabel" x="555" y="351">Review many to 1 User</text>
  <text class="fieldMuted" x="555" y="370">@ManyToOne user</text>

  <g transform="translate(80 805)">
    <rect class="pill" x="0" y="-18" width="92" height="28"/>
    <text class="pillText" x="14" y="1">DATA FLOW</text>
    <text class="noteText" x="110" y="2">Users create reviews for movies. Reviews hold the owning @ManyToOne links. Subscription stores the user_id join column.</text>
  </g>
</svg>
